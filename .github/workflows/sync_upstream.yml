name: Sync from Upstream

on:
  schedule:
    - cron: '0 2 * * 1'  # 每周一 02:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/bggRGjQaUbCoE/PiliPlus.git
          git fetch upstream

      - name: Update upstream branch
        id: update
        run: |
          # 用 ls-remote 获取上游默认分支名（避免 git remote show 解析失败）
          UPSTREAM_BRANCH=$(git ls-remote --symref upstream HEAD \
            | head -1 | sed 's|ref: refs/heads/||' | awk '{print $1}')
          echo "Upstream default branch: $UPSTREAM_BRANCH"

          # 记录当前 origin/upstream 的提交（用于判断是否有变更）
          if git ls-remote --exit-code --heads origin upstream > /dev/null 2>&1; then
            BEFORE=$(git rev-parse origin/upstream)
          else
            BEFORE=""
          fi

          # -B：若本地分支已存在则强制重置，不存在则新建；不会出现 detached HEAD
          git checkout -B upstream upstream/$UPSTREAM_BRANCH

          AFTER=$(git rev-parse HEAD)
          git push origin upstream --force

          # 比较前后提交判断是否有实际变更
          if [ "$BEFORE" = "$AFTER" ]; then
            echo "No changes detected, skipping PR."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create or reuse Pull Request
        if: steps.update.outputs.has_changes == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          PR_NUMBER=$(gh pr list \
            --head upstream \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -z "$PR_NUMBER" ]; then
            PR_URL=$(gh pr create \
              --title "chore: sync upstream $(date +'%Y-%m-%d')" \
              --body "由 GitHub Actions 自动同步自 [bggRGjQaUbCoE/PiliPlus](https://github.com/bggRGjQaUbCoE/PiliPlus)。" \
              --head upstream \
              --base main)
            PR_NUMBER=$(basename "$PR_URL")
            echo "Created PR #$PR_NUMBER"
          else
            echo "Existing PR #$PR_NUMBER"
          fi

          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Auto-merge Pull Request
        if: steps.pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.pr_number }}"

          # 优先尝试启用自动合并（需仓库开启 Allow auto-merge）
          if gh pr merge "$PR_NUMBER" --auto --merge 2>/dev/null; then
            echo "Auto-merge queued for PR #$PR_NUMBER"
          else
            # 退而求其次：直接合并
            if gh pr merge "$PR_NUMBER" --merge \
              --subject "chore: sync upstream $(date +'%Y-%m-%d')"; then
              echo "PR #$PR_NUMBER merged directly"
            else
              echo "PR #$PR_NUMBER cannot be merged automatically (possible conflicts)"
            fi
          fi
