name: Sync from Upstream

on:
  schedule:
    - cron: '0 2 * * 1'  # 每周一 02:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "TODAY=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/bggRGjQaUbCoE/PiliPlus.git
          git fetch upstream

      - name: Merge upstream changes
        id: merge
        run: |
          # 用 ls-remote 获取上游默认分支名（避免 git remote show 解析失败）
          UPSTREAM_BRANCH=$(git ls-remote --symref upstream HEAD \
            | head -1 | sed 's|ref: refs/heads/||' | awk '{print $1}')
          echo "Upstream default branch: $UPSTREAM_BRANCH"

          # 尝试 no-commit 合并，检测是否有实际变更
          if git merge --no-commit --no-ff upstream/$UPSTREAM_BRANCH; then
            if git diff --cached --quiet; then
              echo "No changes detected, skipping PR."
              echo "has_changes=false" >> $GITHUB_OUTPUT
              git merge --abort 2>/dev/null || true
            else
              echo "has_changes=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "Merge conflicts detected, need PR."
            echo "has_changes=true" >> $GITHUB_OUTPUT
            git merge --abort
          fi

      - name: Create Pull Request
        if: steps.merge.outputs.has_changes == 'true'
        id: pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PAT }}
          commit-message: "chore: sync upstream"
          branch: sync/upstream
          title: "chore: sync upstream ${{ env.TODAY }}"
          body: "由 GitHub Actions 自动同步自 [bggRGjQaUbCoE/PiliPlus](https://github.com/bggRGjQaUbCoE/PiliPlus)。"
          base: main

      - name: Auto-merge Pull Request
        if: steps.pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.pull-request-number }}"

          # 优先尝试启用自动合并（需仓库开启 Allow auto-merge）
          if gh pr merge "$PR_NUMBER" --auto --merge 2>/dev/null; then
            echo "Auto-merge queued for PR #$PR_NUMBER"
          else
            # 退而求其次：直接合并
            if gh pr merge "$PR_NUMBER" --merge \
              --subject "chore: sync upstream $(date +'%Y-%m-%d')"; then
              echo "PR #$PR_NUMBER merged directly"
            else
              echo "PR #$PR_NUMBER cannot be merged automatically (possible conflicts)"
            fi
          fi
